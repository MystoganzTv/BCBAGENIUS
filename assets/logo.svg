<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C7D2FE;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4F46E5" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Ícono cuadrado redondeado -->
  <rect x="0" y="10" width="100" height="100" rx="24" ry="24" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Cerebro estilizado -->
  <!-- Hemisferio izquierdo -->
  <path d="M28 55 C28 38 38 28 50 28 C56 28 60 31 62 35 L62 72 C60 76 56 78 50 78 C38 78 28 72 28 55Z"
        fill="none" stroke="url(#iconGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Hemisferio derecho -->
  <path d="M72 55 C72 38 62 28 50 28 C50 28 62 35 62 35 L62 72 C62 72 50 78 50 78 C62 78 72 72 72 55Z"
        fill="none" stroke="url(#iconGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- División central -->
  <line x1="50" y1="28" x2="50" y2="78" stroke="url(#iconGrad)" stroke-width="2.5" stroke-dasharray="4,3"/>
  <!-- Surcos cerebrales izquierdo -->
  <path d="M34 48 Q40 44 44 50 Q48 56 44 62" fill="none" stroke="url(#iconGrad)" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M30 60 Q36 56 40 60" fill="none" stroke="url(#iconGrad)" stroke-width="2" stroke-linecap="round"/>
  <!-- Surcos cerebrales derecho -->
  <path d="M66 48 Q60 44 57 50 Q53 56 57 62" fill="none" stroke="url(#iconGrad)" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M70 60 Q64 56 60 60" fill="none" stroke="url(#iconGrad)" stroke-width="2" stroke-linecap="round"/>
  <!-- Tronco -->
  <path d="M44 78 Q50 85 56 78" fill="none" stroke="url(#iconGrad)" stroke-width="3" stroke-linecap="round"/>

  <!-- Texto "ABA" -->
  <text x="116" y="65" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif"
        font-size="52" font-weight="800" fill="#1E293B" letter-spacing="-1">ABA</text>

  <!-- Texto "Genius" -->
  <text x="240" y="65" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif"
        font-size="52" font-weight="800" fill="#4F46E5" letter-spacing="-1">Genius</text>

  <!-- Línea decorativa debajo -->
  <rect x="116" y="74" width="350" height="3.5" rx="2" fill="#4F46E5" opacity="0.2"/>

  <!-- Tagline -->
  <text x="116" y="96" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif"
        font-size="12" font-weight="500" fill="#64748B" letter-spacing="2" text-anchor="start">BCBA &amp; BCaBA EXAM PREP</text>
</svg>
